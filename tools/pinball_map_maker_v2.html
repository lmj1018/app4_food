<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>핀볼 V2 맵 메이커</title>
  <style>
    :root {
      --bg: #09101f;
      --panel: #131f39;
      --line: #2f4068;
      --text: #d8e4ff;
      --muted: #98abd3;
      --primary: #49b5ff;
      --success: #4de1a5;
      --warn: #ffbd66;
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 12% 10%, #15274f 0%, var(--bg) 54%);
      color: var(--text);
      font-family: Segoe UI, Arial, sans-serif;
      padding-bottom: 58px;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px minmax(600px, 1fr);
      gap: 12px;
      height: 100%;
      padding: 12px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(14, 22, 40, 0.92);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #1c2a4d 0%, #152240 100%);
      font-weight: 700;
      font-size: 14px;
    }
    .panel-body {
      padding: 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .group {
      border: 1px solid #2d436c;
      border-radius: 10px;
      padding: 10px;
      background: #0c1731;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .group-title {
      font-size: 12px;
      color: #9ec0ff;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .row {
      display: grid;
      grid-template-columns: 100px 1fr;
      align-items: center;
      gap: 8px;
    }
    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input,
    select,
    textarea,
    button {
      font: inherit;
    }
    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      background: #0d1730;
      color: var(--text);
      border: 1px solid #334772;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .btn-row.single {
      grid-template-columns: 1fr;
    }
    button {
      border: 1px solid #3e578e;
      background: linear-gradient(180deg, #203056 0%, #1a294a 100%);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    button.primary {
      border-color: #4ea4ff;
      background: linear-gradient(180deg, #2680da 0%, #1e63b3 100%);
    }
    button.warn {
      border-color: #dc9750;
      background: linear-gradient(180deg, #ac6f2f 0%, #845522 100%);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .inline-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .inline-note.strong {
      color: #ffd79b;
    }
    .dir-status {
      font-size: 12px;
      color: #8fe7be;
      border: 1px dashed #3d6a56;
      background: #0e1f1b;
      border-radius: 8px;
      padding: 7px 9px;
    }
    .status {
      font-size: 12px;
      border: 1px solid #315582;
      border-radius: 8px;
      background: #0d1934;
      padding: 8px 10px;
      color: var(--success);
      min-height: 36px;
      white-space: pre-wrap;
    }
    .engine-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      min-height: 0;
      background: #090f1d;
      display: flex;
      flex-direction: column;
    }
    .engine-head {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #111c35;
      color: var(--muted);
      font-size: 12px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
      flex: 1;
      min-height: 0;
    }
    .floating-controls {
      position: fixed;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      z-index: 1200;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 10px;
      border: 1px solid #3b4f7b;
      background: rgba(12, 20, 38, 0.92);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(3px);
    }
    .floating-controls button {
      min-width: 94px;
      padding: 7px 9px;
    }
    .transport-toggle {
      min-width: 128px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .transport-icon {
      width: 18px;
      text-align: center;
      font-size: 15px;
      line-height: 1;
    }
    .transport-toggle[aria-pressed="true"] {
      border-color: #ff9f67;
      background: linear-gradient(180deg, #9a5e30 0%, #744621 100%);
    }
    .floating-group {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #334b79;
      border-radius: 9px;
      padding: 4px 8px;
      background: rgba(14, 24, 46, 0.86);
    }
    .floating-group-title {
      font-size: 11px;
      color: #9bb8ec;
      font-weight: 700;
      white-space: nowrap;
    }
    .floating-slot-radios {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    .floating-slot-radios label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #d8e4ff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .floating-slot-radios input[type="radio"] {
      width: auto;
      margin: 0;
    }
    .floating-slot-actions {
      display: inline-flex;
      gap: 5px;
      flex-wrap: nowrap;
    }
    @media (max-width: 1140px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .floating-controls {
        width: calc(100% - 24px);
        left: 12px;
        transform: none;
        flex-wrap: wrap;
      }
      .floating-controls button {
        min-width: 0;
      }
      .floating-group {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <div class="panel-head">핀볼 V2 맵 메이커</div>
      <div class="panel-body">
        <div class="group">
          <div class="group-title">0) 맵 파일 저장/불러오기 (고정 경로: assets/ui/pinball/maps)</div>
          <div class="inline-note">맵은 드롭다운에서 선택하면 즉시 로드/적용됩니다.</div>
          <div class="row">
            <label for="mapSelect">저장 맵 목록</label>
            <select id="mapSelect"></select>
          </div>
          <div class="row">
            <label for="mapNameInput">새 맵 이름</label>
            <input id="mapNameInput" type="text" value="v2_custom_map" placeholder="예: my_pinball_map">
          </div>
          <div class="btn-row">
            <button id="refreshMapListButton">목록 새로고침</button>
            <button id="saveSelectedMapButton">선택 맵 저장(덮어쓰기)</button>
          </div>
          <div class="btn-row single">
            <button id="saveAsNewMapButton" class="primary">새 맵으로 저장</button>
          </div>
          <div class="inline-note">새 맵 저장은 입력한 이름을 <code>ID/제목</code>으로 동일하게 사용합니다.</div>
        </div>
        <div id="statusBox" class="status">엔진 연결을 기다리는 중...</div>
        <div class="inline-note">
          작업 순서: 맵 목록 선택(자동 로드/적용) → 하단 바에서 시작/일시정지 테스트 → 저장(덮어쓰기/새 맵 저장) → 슬롯 퀵세이브/퀵로드
        </div>
        <div class="inline-note">
          불러오기는 기본적으로 일시정지 상태로 복원됩니다.
        </div>
      </div>
    </section>
    <section class="engine-wrap">
      <div class="engine-head">엔진 iframe: <code id="engineUrlText">불러오는 중...</code></div>
      <iframe id="engineFrame" title="pinball-v2-engine"></iframe>
    </section>
  </div>
  <div class="floating-controls">
    <button id="playPauseToggleButton" class="transport-toggle primary" aria-pressed="false">
      <span id="playPauseIcon" class="transport-icon">▶</span>
      <span id="playPauseText">시작</span>
    </button>
    <button id="resetButton">리셋</button>
    <button id="reloadButton">엔진 다시 불러오기</button>
    <div class="floating-group" role="group" aria-label="스냅샷 슬롯">
      <span class="floating-group-title">스냅샷</span>
      <div class="floating-slot-radios">
        <label><input type="radio" name="snapshotSlot" value="slot1" checked> 1</label>
        <label><input type="radio" name="snapshotSlot" value="slot2"> 2</label>
        <label><input type="radio" name="snapshotSlot" value="slot3"> 3</label>
      </div>
      <div class="floating-slot-actions">
        <button id="quickSaveButton">퀵 세이브</button>
        <button id="quickLoadButton">퀵 로드</button>
      </div>
    </div>
  </div>
  <script src="./pinball_map_maker_v2.js"></script>
</body>
</html>
